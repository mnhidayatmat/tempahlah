<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline · Tempahlah</title>
  <link rel="icon" type="image/svg+xml" href="/icons/logo.svg">
  <style>
    :root { --primary: #2596c6; --ink: #14202c; --ink-3: #6b7a8a; --bg: #ffffff; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--ink);
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    .wrap { max-width: 360px; }
    img { width: 72px; height: 72px; margin-bottom: 20px; }
    h1 { font-size: 22px; font-weight: 600; margin: 0 0 8px; }
    p { font-size: 14px; line-height: 1.5; color: var(--ink-3); margin: 0 0 24px; }
    button {
      border: 0; border-radius: 10px; padding: 12px 22px;
      background: var(--primary); color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="/icons/logo.svg" alt="Tempahlah">
    <h1>You're offline</h1>
    <p>Tempahlah needs an internet connection to load this page. Check your connection and try again.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
